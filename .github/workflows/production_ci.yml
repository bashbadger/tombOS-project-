name: Tomb OS Enterprise Production CI/CD Pipeline

on:
  push:
    branches: [ main, release/* ]
  pull_request:
    branches: [ main ]

jobs:
  build-kernel-and-iso:
    name: 🐧 Compile Bare-Metal C Kernel & Build Live ISO
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install Cross-Compiler Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-x86-64-linux-gnu nasm mtools xorriso cpio gzip build-essential

      - name: Build Freestanding Monolithic C Kernel
        run: |
          make -C kernel clean || true
          ./kernel/build.sh

      - name: Build Hardened Initrd Rootfs
        run: |
          ./scripts/build_rootfs.sh

      - name: Verify Kernel Binary Integrity
        run: |
          test -f kernel/kernel.bin
          sha256sum kernel/kernel.bin

  build-multi-agent-sdk:
    name: 🤖 Compile TypeScript Multi-Agent Engine & SDK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: agents/package-lock.json

      - name: Install & Compile Multi-Agent Framework
        run: |
          cd agents
          npm ci
          npx tsc
          node dist/demo.js

  build-docker-containers:
    name: 🐳 Build & Test Hardened Rootless Containers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Production Container Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: tomb-os:latest

  security-compliance-audit:
    name: 🛡️ Run Static Analysis & Security Compliance Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Validate System Configuration Files
        run: |
          node -c app.js
          test -f docker-compose.yml
          test -f nginx.conf
