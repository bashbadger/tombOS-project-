version: '3.8'

services:
  tombos-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tombos_hardened_desktop
    ports:
      - "8080:80"
    restart: always
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      - PRODUCTIVITY_ZONE=work
      - COMPLIANCE_MODE=STRICT_GDPR_CCPA_DPDP

  tombos-ids:
    image: alpine:latest
    container_name: tombos_ids_suricata
    command: sh -c "echo '[IDS CONTAINER] Suricata packet monitoring active...' && tail -f /dev/null"
    restart: always
    read_only: true
    cap_drop:
      - ALL
