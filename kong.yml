_format_version: "1.1"
services:
  - name: tombos-auth
    url: http://auth-service:8080
    routes:
      - name: auth-route
        paths:
          - /api/v1/auth
        methods:
          - POST
        strip_path: true
  - name: tombos-security
    url: http://security-stack:5601
    routes:
      - name: security-route
        paths:
          - /api/v1/security
        strip_path: true
  - name: tombos-analytics
    url: http://analytics-stack:3000
    routes:
      - name: analytics-route
        paths:
          - /api/v1/analytics
        strip_path: true

plugins:
  - name: rate-limiting
    service: tombos-auth
    config:
      minute: 60
      policy: local
  - name: key-auth
    service: tombos-auth
    config: {}
  - name: request-transformer
    service: tombos-security
    config:
      remove:
        headers: ["X-Api-Key"]
  - name: cors
    service: tombos-analytics
    config:
      origins: ["*"]
      methods: ["GET", "POST", "PUT", "DELETE"]
      headers: ["Authorization", "Content-Type"]
      exposed_headers: ["X-Total-Count"]
      credentials: true
      max_age: 3600
