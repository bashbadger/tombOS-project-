events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 443 ssl http2;
        server_name tombos.example.com;

        # SSL configuration (replace with your cert/key paths)
        ssl_certificate     /etc/nginx/ssl/tombos.crt;
        ssl_certificate_key /etc/nginx/ssl/tombos.key;
        ssl_protocols       TLSv1.3 TLSv1.2;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # HSTS (24 weeks) and other security headers
        add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-XSS-Protection "1; mode=block";

        location / {
            # Proxy to Kong (API Gateway) running on host network port 8000
            proxy_pass http://kong:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Optional HTTP -> HTTPS redirect
    server {
        listen 80;
        server_name tombos.example.com;
        return 301 https://$host$request_uri;
    }
}
